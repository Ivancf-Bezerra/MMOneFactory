# Blueprint Render: publica o build Angular ja commitado em git (docs/ na raiz).
# Se no futuro o repositorio incluir o codigo MMSITE/, troque para rootDir: MMSITE + buildCommand.
services:
  - type: web
    name: mmsite
    runtime: static
    staticPublishPath: ./docs
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

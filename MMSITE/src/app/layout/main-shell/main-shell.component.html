<div class="min-h-screen">
  <!-- ── Header ─────────────────────────────────────── -->
  <header
    class="sticky top-0 z-20 border-b border-slate-200/90 bg-white/90 shadow-sm backdrop-blur-md"
    style="background-image: linear-gradient(180deg, rgba(255, 255, 255, 0.97) 0%, rgba(248, 250, 252, 0.92) 100%)"
  >
    <div class="mx-auto flex max-w-6xl items-center justify-between gap-4 px-4 py-0">

      <!-- Logo -->
      <div class="flex shrink-0 items-center gap-2.5 py-3">
        <span
          class="grid h-8 w-8 place-content-center rounded-md bg-blue-900 text-sm font-bold text-white shadow-sm"
        >M</span>
        <a
          class="hidden text-sm font-bold tracking-tight text-slate-900 sm:block"
          routerLink="/transaction/create"
        >Middleman</a>
      </div>

      <!-- Nav central -->
      <nav class="flex h-full items-stretch gap-0.5">
        <a
          routerLink="/transaction/create"
          routerLinkActive="border-b-2 border-cyan-500 font-semibold text-blue-800"
          class="flex items-center border-b-2 border-transparent px-4 py-3 text-sm font-medium text-slate-600 transition hover:text-slate-900"
        >
          Nova transação
        </a>
        <a
          routerLink="/dashboard"
          routerLinkActive="border-b-2 border-cyan-500 font-semibold text-blue-800"
          class="flex items-center border-b-2 border-transparent px-4 py-3 text-sm font-medium text-slate-600 transition hover:text-slate-900"
        >
          Dashboard
        </a>
        <span
          class="flex cursor-not-allowed items-center border-b-2 border-transparent px-4 py-3 text-sm font-medium text-slate-400"
          title="Em desenvolvimento"
        >
          Catálogo
          <span class="ml-1.5 rounded-md bg-slate-100 px-1.5 py-0.5 text-[10px] font-semibold uppercase tracking-wide text-slate-400">Em breve</span>
        </span>
      </nav>

      <!-- Conta / Sair -->
      <div class="flex shrink-0 items-center gap-2 py-3">
        <span class="hud-chip hidden sm:inline-flex">✓ Verificado</span>
        <button
          type="button"
          (click)="logout()"
          class="btn-ghost py-1.5 text-xs"
        >
          Sair
        </button>
      </div>
    </div>
  </header>

  <!-- ── Conteúdo ────────────────────────────────────── -->
  <main class="mx-auto max-w-6xl px-4 py-6">
    <router-outlet />
  </main>
</div>
